<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AcadChain</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#1e3a5f;--accent:#00d4ff;--accent2:#7c3aed;--green:#00ff9d;--text:#e2e8f0;--muted:#64748b;--error:#ff4d6d;--font-head:'Syne',sans-serif;--font-mono:'Space Mono',monospace;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .container{width:100%;max-width:520px;}
    .back-link{display:inline-flex;align-items:center;gap:0.5rem;color:var(--muted);text-decoration:none;font-family:var(--font-mono);font-size:0.8rem;margin-bottom:2rem;transition:color 0.2s;}
    .back-link:hover{color:var(--accent);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--green));}
    .logo{font-family:var(--font-mono);font-size:1.2rem;font-weight:700;color:var(--accent);margin-bottom:0.5rem;}
    .logo span{color:var(--green);}
    h1{font-size:1.5rem;font-weight:800;letter-spacing:-1px;margin-bottom:0.4rem;}
    .sub{color:var(--muted);font-size:0.85rem;margin-bottom:2rem;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-group{margin-bottom:1rem;}
    label{display:block;font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:0.4rem;}
    input,select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;color:var(--text);font-family:var(--font-mono);font-size:0.85rem;outline:none;transition:border-color 0.2s;}
    input:focus,select:focus{border-color:var(--accent);}
    select option{background:var(--surface);}
    .alert{display:none;background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:8px;padding:0.8rem 1rem;color:var(--error);font-size:0.85rem;font-family:var(--font-mono);margin-bottom:1rem;}
    .alert.show{display:block;}
    .success{display:none;background:rgba(0,255,157,0.08);border:1px solid rgba(0,255,157,0.2);border-radius:8px;padding:1rem;color:var(--green);font-family:var(--font-mono);font-size:0.85rem;margin-bottom:1rem;text-align:center;}
    .success.show{display:block;}
    .btn{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:1rem;font-family:var(--font-mono);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:0.5rem;}
    .btn:hover{background:var(--green);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .footer{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.85rem;}
    .footer a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>
<div class="container">
  <a href="login.html" class="back-link">← Back to Login</a>
  <div class="card">
    <div class="logo">Acad<span>Chain</span></div>
    <h1>Create Account</h1>
    <div class="sub">Register as a student to access your credentials</div>
    <div class="alert" id="alert-box"></div>
    <div class="success" id="success-box">✅ Registration successful! Redirecting to login...</div>
    <div class="grid-2">
      <div class="form-group"><label>First Name</label><input type="text" id="fname" placeholder="John"/></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="lname" placeholder="Doe"/></div>
    </div>
    <div class="form-group"><label>Register Number</label><input type="text" id="regno" placeholder="21CS047"/></div>
    <div class="grid-2">
      <div class="form-group"><label>Department</label>
        <select id="dept">
          <option value="Computer Science">Computer Science</option>
          <option value="Information Technology">Information Technology</option>
          <option value="Electronics">Electronics</option>
          <option value="Mechanical">Mechanical</option>
        </select>
      </div>
      <div class="form-group"><label>Semester</label>
        <select id="sem">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5" selected>5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@college.edu"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="pass" placeholder="Create a password"/></div>
    <button class="btn" id="reg-btn" onclick="handleRegister()">Create Account →</button>
    <div class="footer">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</div>
<script>
  const API = 'http://localhost:8080';
 
  function handleRegister() {
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();
    const regno = document.getElementById('regno').value.trim();
    const dept = document.getElementById('dept').value;
    const sem = parseInt(document.getElementById('sem').value);
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const alertBox = document.getElementById('alert-box');
    const successBox = document.getElementById('success-box');
    const btn = document.getElementById('reg-btn');
 
    alertBox.classList.remove('show');
    if (!fname || !lname || !regno || !email || !pass) {
      alertBox.textContent = 'Please fill all fields!'; alertBox.classList.add('show'); return;
    }
 
    btn.disabled = true; btn.textContent = 'Registering...';
 
    fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ name: fname + ' ' + lname, email, password: pass, registerNumber: regno, department: dept, semester: sem })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        successBox.classList.add('show');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        alertBox.textContent = data.message || 'Registration failed';
        alertBox.classList.add('show');
        btn.disabled = false; btn.textContent = 'Create Account →';
      }
    })
    .catch(() => {
      alertBox.textContent = '❌ Cannot connect to server! Make sure Spring Boot is running on port 8080';
      alertBox.classList.add('show');
      btn.disabled = false; btn.textContent = 'Create Account →';
    });
  }
</script>
</body>
</html>
